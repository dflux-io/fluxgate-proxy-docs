<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0a0a0a" />

    <title>fluxgate-proxy docs</title>
    <meta name="description" content="Documentation for fluxgate-proxy — a high-performance 5G SBI / 4G Diameter signaling proxy. Policy enforcement, transformation, content-based routing, and rate limiting across HTTP/2 SBI and Diameter, at wire speed." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="fluxgate-proxy docs" />
    <meta property="og:description" content="5G SBI & 4G Diameter signaling proxy. Policy · transformation · routing · rate limiting — one Go binary, at wire speed." />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="fluxgate-proxy docs" />
    <meta name="twitter:description" content="5G SBI & 4G Diameter signaling proxy. Policy, transformation, routing, rate limiting — at wire speed." />
    <meta name="twitter:image" content="/og-image.svg" />
    <script>
      // Apply theme synchronously before React hydrates to avoid FOUC.
      // Default is dark.
      (function () {
        try {
          var stored = localStorage.getItem('fluxdocs-theme');
          var theme = stored || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
